---
name: Python Updates

on:  # yamllint disable-line rule:truthy
  schedule:
    - cron: '0 0 * * 1,3,5'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dependencies:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Poetry
        run: curl -sSL https://install.python-poetry.org | python3 -

      - name: Add Poetry to PATH
        run: echo "${HOME}/.local/bin" >> $GITHUB_PATH

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'poetry'

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Update dependencies
        run: poetry update --no-interaction

      - name: Check for changes
        id: check-changes
        run: |
          if git diff --quiet poetry.lock; then
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            echo "changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Configure Git
        if: steps.check-changes.outputs.changes == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Create branch and push changes
        if: steps.check-changes.outputs.changes == 'true'
        run: |
          BRANCH_NAME="deps/python-updates-$(date +%Y%m%d)"
          git checkout -b "$BRANCH_NAME"
          git add poetry.lock pyproject.toml
          git commit -m "chore: update Python dependencies"
          git push origin "$BRANCH_NAME"
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV

      - name: Create Pull Request
        if: steps.check-changes.outputs.changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --title "chore: update Python dependencies" \
            --body "Automated dependency update from scheduled workflow." \
            --base main \
            --head "$BRANCH_NAME"

      - name: Enable auto-merge
        if: steps.check-changes.outputs.changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr merge "$BRANCH_NAME" --auto --squash --delete-branch
